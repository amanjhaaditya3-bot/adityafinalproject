<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: rgb(50, 205, 115);
    display: flex;
    justify-content: center;
    align-items: center;
}

.player {
    width: 320px;
    background: #111;
    color: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.cover img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

.info {
    text-align: center;
    margin-bottom: 15px;
}

.info h2 {
    font-size: 20px;
}

.info p {
    font-size: 14px;
    color: #aaa;
}

/* ✅ Progress Bar */
.time {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
}

.progress-container {
    flex: 1;
    height: 5px;
    background: rgb(41, 25, 25);
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: rgb(14, 175, 234);
}

/* Controls */
.controls {
    margin-top: 20px;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.controls button {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.play-main {
    background: rgb(14, 175, 234);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Volume */
.volume {
    margin-top: 15px;
    text-align: center;
}
</style>

</head>

<body>

<div class="player">

    <div class="cover">
        <img src="images.jpeg">
    </div>

    <!-- ✅ Audio -->
    <audio id="audio" src="song4.mp3"></audio>

    <div class="info">
        <h2>Happy Lives</h2>
        <p>For Your Happy Wala Mood.</p>
    </div>

    <!-- ✅ Time + Progress -->
    <div class="time">
        <span id="currentTime">0:00</span>

        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>

        <span id="duration">0:00</span>
    </div>

    <!-- ✅ Controls -->
    <div class="controls">
        <button id="prev">⏮</button>
        <button class="play-main">▶</button>
        <button id="next">⏭</button>
    </div>

    <!-- ✅ Volume -->
    <div class="volume">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>

</div>

<script src="script1.js"></script>

</body>
</html>
